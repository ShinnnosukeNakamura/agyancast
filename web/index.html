<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>熊本市 混雑状況 | あーぎゃん予報</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div class="hero-title">
          <span class="hero-city">熊本市</span>
          <span class="hero-sub">混雑状況</span>
        </div>
        <div class="hero-meta">
          <div class="hero-update">
            <span class="label">データ時刻</span>
            <span id="updated-time">----</span>
          </div>
        </div>
      </header>

      <main>
        <section class="map-shell">
          <div class="map" id="map">
            <div class="map-bg"></div>
            <div class="map-overlay" id="map-overlay"></div>
            <div class="map-direction">阿蘇方面 →</div>
          </div>
        </section>

        <section class="trend" id="trend">
          <div class="trend-header">
            <div class="trend-title">今日の混雑推移</div>
            <div class="trend-meta" id="trend-meta">--</div>
          </div>
          <div class="trend-chart">
            <div class="trend-scroll">
              <canvas id="daily-delay-chart" height="160"></canvas>
            </div>
          </div>
        </section>

        <section class="mobile-list" id="mobile-list"></section>

        <section class="legend">
          <div class="legend-item" data-status="low">
            <span class="legend-swatch"></span>
            <span>スイスイ</span>
          </div>
          <div class="legend-item" data-status="medium">
            <span class="legend-swatch"></span>
            <span>普通</span>
          </div>
          <div class="legend-item" data-status="high">
            <span class="legend-swatch"></span>
            <span>混雑</span>
          </div>
          <div class="legend-item" data-status="very_high">
            <span class="legend-swatch"></span>
            <span>大混雑</span>
          </div>
          <div class="legend-item" data-status="unknown">
            <span class="legend-swatch"></span>
            <span>データ不足</span>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
  </body>
</html>
